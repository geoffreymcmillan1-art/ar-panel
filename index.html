<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My AR Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>

<a-scene
  embedded
  webxr="optionalFeatures: local-floor,hand-tracking,hit-test,anchors"
  vr-mode-ui="enabled: true; enterVREnabled: false; enterAREnabled: true"
  renderer="antialias: false; colorManagement: true"
  background="color: #1a1a2e">

  <!-- Simple test box so you know the scene is alive -->
  <a-box
    position="0 1.5 -2"
    rotation="0 45 0"
    width="0.5" height="0.5" depth="0.5"
    color="#4A90D9"
    class="interactive">
  </a-box>

  <!-- Text label -->
  <a-text
    value="AR Panel App - Tap Enter AR"
    position="0 2.2 -2"
    align="center"
    color="#ffffff"
    width="4">
  </a-text>

  <!-- Floating dark panel -->
  <a-plane
    id="panel-entity"
    position="0 1.5 -1.8"
    width="1.2" height="0.8"
    color="#141e2e"
    opacity="0.95"
    side="double">

    <!-- Tab bar as coloured strips -->
    <a-plane position="-0.3 0.32 0.01" width="0.34" height="0.1" color="#4A90D9" opacity="0.9">
      <a-text value="Text" align="center" color="#fff" width="1.4" position="0 0 0.01"></a-text>
    </a-plane>
    <a-plane position="0 0.32 0.01" width="0.34" height="0.1" color="#2a3a4a" opacity="0.9">
      <a-text value="Image" align="center" color="#fff" width="1.4" position="0 0 0.01"></a-text>
    </a-plane>
    <a-plane position="0.3 0.32 0.01" width="0.34" height="0.1" color="#2a3a4a" opacity="0.9">
      <a-text value="Video" align="center" color="#fff" width="1.4" position="0 0 0.01"></a-text>
    </a-plane>

    <!-- Text area placeholder -->
    <a-plane position="0 0 0.01" width="1.1" height="0.45" color="#0d1520" opacity="0.8">
      <a-text value="Your notes appear here." align="center" color="#aaaacc" width="2.6" position="0 0 0.01"></a-text>
    </a-plane>

    <!-- Pin button -->
    <a-plane position="0 -0.33 0.01" width="0.5" height="0.1" color="#1a7a3c" opacity="0.85"
      class="interactive"
      id="pin-btn"
      event-set__mouseenter="color: #2aaa5c"
      event-set__mouseleave="color: #1a7a3c">
      <a-text value="Pin Here" align="center" color="#fff" width="1.8" position="0 0 0.01"></a-text>
    </a-plane>

  </a-plane>

  <!-- Camera rig -->
  <a-entity id="rig" position="0 0 0">
    <a-entity
      camera
      id="cam"
      position="0 1.6 0"
      look-controls="pointerLockEnabled: false"
      wasd-controls="enabled: false">
    </a-entity>

    <!-- Hand tracking -->
    <a-entity hand-tracking-controls="hand: left"></a-entity>
    <a-entity
      hand-tracking-controls="hand: right"
      raycaster="objects: .interactive; far: 5; showLine: true"
      line="color: #88aaff; opacity: 0.6">
    </a-entity>
  </a-entity>

</a-scene>

<script>
  // Confirm A-Frame loaded
  window.addEventListener('load', function() {
    var scene = document.querySelector('a-scene');
    if (scene) {
      scene.addEventListener('loaded', function() {
        console.log('A-Frame loaded successfully');
      });
    }
  });
</script>

</body>
</html>
